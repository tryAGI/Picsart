security:
  - apiKey: []

components:
  schemas:
    UploadParameters:
      type: object
      properties:
        image:
          description: Source image file (binary). (If this parameter is present, the other image source parameters must be empty.)
          type: string
          format: binary
        image_url:
          type: string
          description: Source image URL. (If this parameter is present, the other image source parameters must be empty.)
          maxLength: 2083
          minLength: 1
          format: uri
    ImageParameters:
      type: object
      properties:
        image:
          description: Source image file (binary). (If this parameter is present, the other image source parameters must be empty.)
          type: string
          format: binary
        image_url:
          type: string
          description: Source image URL. (If this parameter is present, the other image source parameters must be empty.)
          maxLength: 2083
          minLength: 1
          format: uri
        image_id:
          type: string
          description: Source image ID of an image previously uploaded to Picsart or result image ID from a different API. (If this parameter is present, the other image source parameters must be empty.)
    FileParameters:
      type: object
      properties:
        file:
          description: Source file (binary). (If this parameter is present, the other source parameters must be empty.)
          type: string
          format: binary
        file_url:
          type: string
          description: Source file URL. (If this parameter is present, the other source parameters must be empty.)
          maxLength: 2083
          minLength: 1
          format: uri
    DataFileParameters:
      type: object
      properties:
        data:
          description: >
            Source data file as a string. Comma separated values only.
            The first line should always be the header line, with column names. Only the first 50 data rows will be processed.
            (If this parameter is present, the other data file source parameters must be empty.)
          type: string
        data_file:
          description: >
            Source data (CSV) file (binary, attachment).
            The first line should always be the header line, with column names. Only the first 50 data rows will be processed.
            (If this parameter is present, the other data file source parameters must be empty.)
          type: string
          format: binary
        data_file_url:
          type: string
          description: >
            Source data (CSV) file URL.
            The first line should always be the header line, with column names. Only the first 50 data rows will be processed.
            (If this parameter is present, the other data file source parameters must be empty.)
          maxLength: 2083
          minLength: 1
          format: uri
    TemplateParameters:
      type: object
      properties:
        template_id:
          type: string
          description: Source template ID from Picsart Inventory. (If this parameter is present, the other template source parameters must be empty.)
        template:
          description: Source replay file (binary). (If this parameter is present, the other template source parameters must be empty.)
          type: string
          format: binary
        template_url:
          type: string
          description: Source replay URL. (If this parameter is present, the other template source parameters must be empty.)
          maxLength: 2083
          minLength: 1
          format: uri
    
    ExportReplayParameters:
      type: object
      properties:
        #mode:
        #  type: string
        #  default: async
        #  enum:
        #    - async
        #  description: >
        #    Use this query parameter to establish the processing mode. Acceptable values are sync, async and auto:
        #      * async: forces an asynchronous request, the response, which is instantaneous, contains a "transaction_id" which is used to poll for the result.
        format:
          type: string
          default: PDF
          enum:
            - PDF
          description: >
            Optionally select one of the export formats. Options are as follows:
              * PDF (Print-Ready PDF file)
    ExportVariableDataContentParameters:
      type: object
      properties:
        #mode:
        #  type: string
        #  default: async
        #  enum:
        #    - async
        #  description: >
        #    Use this query parameter to establish the processing mode. Acceptable values are sync, async and auto:
        #      * async: forces an asynchronous request, the response, which is instantaneous, contains a "transaction_id" which is used to poll for the result.
        mapping:
          type: string
          description: Comma separated mapping of fields.
        format:
          type: string
          default: PDF
          enum:
            - PDF
            - PNG
            - JPG
            - MP4
            - REPLAY
          description: >
            Optionally select one of the export formats. Options are as follows:
              * PDF
              * PNG
              * JPG
              * MP4
              * REPLAY
    
    Error:
      type: object
      properties:
        message:
          type: string
        detail:
          type: string
      required:
        - detail
    401_Error:
      type: object
      properties:
        code:
          type: integer
          example: 401
        message:
          type: string
          example: "Unauthorized"
        detail:
          type: string
      required:
        - detail

  responses:
    '200':
      description: Success.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  id:
                    type: string
                    nullable: true
                  url:
                    type: string
                    nullable: false
              status:
                type: string
                nullable: false
      headers:
        X-Picsart-Correlation-Id:
          schema:
            type: string
          description: The id which will help for troubleshooting request chain in the system.
        X-Picsart-Ratelimit-Available:
          schema:
            type: integer
          description: The number of available calls within the timeframe. See the X-Picsart-Ratelimit-Reset-Time.
        X-Picsart-Ratelimit-Limit:
          schema:
            type: integer
          description: The total number of requests that can be done within the timeframe. See the X-Picsart-Ratelimit-Reset-Time.
        X-Picsart-Ratelimit-Reset-Time:
          schema:
            type: integer
          description: The time when the used request count resets and the number of available calls gets equal to the total number.
        X-Picsart-Credit-Available:
          schema:
            type: integer
          description: The remaining number of the credits on the balance.
    '200VariableDataContentDescribe':
      description: Success.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  tags:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum:
                            - image
                            - text
                          nullable: false
                        tag:
                          type: string
                          nullable: false
                  aminated:
                    type: boolean
                    nullable: false
              status:
                type: string
                nullable: false
      headers:
        X-Picsart-Correlation-Id:
          schema:
            type: string
          description: The id which will help for troubleshooting request chain in the system.
        X-Picsart-Ratelimit-Available:
          schema:
            type: integer
          description: The number of available calls within the timeframe. See the X-Picsart-Ratelimit-Reset-Time.
        X-Picsart-Ratelimit-Limit:
          schema:
            type: integer
          description: The total number of requests that can be done within the timeframe. See the X-Picsart-Ratelimit-Reset-Time.
        X-Picsart-Ratelimit-Reset-Time:
          schema:
            type: integer
          description: The time when the used request count resets and the number of available calls gets equal to the total number.
        X-Picsart-Credit-Available:
          schema:
            type: integer
          description: The remaining number of the credits on the balance.
    
    '200VariableDataContent':
      description: Success.
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                nullable: false
              data:
                type: array
                items:
                  type: object
                  properties:
                    urls: 
                      type: array
                      items:
                        type: string
      headers:
        X-Picsart-Correlation-Id:
          schema:
            type: string
          description: The id which will help for troubleshooting request chain in the system.
        X-Picsart-Ratelimit-Available:
          schema:
            type: integer
          description: The number of available calls within the timeframe. See the X-Picsart-Ratelimit-Reset-Time.
        X-Picsart-Ratelimit-Limit:
          schema:
            type: integer
          description: The total number of requests that can be done within the timeframe. See the X-Picsart-Ratelimit-Reset-Time.
        X-Picsart-Ratelimit-Reset-Time:
          schema:
            type: integer
          description: The time when the used request count resets and the number of available calls gets equal to the total number.
        X-Picsart-Credit-Available:
          schema:
            type: integer
          description: The remaining number of the credits on the balance.

    '202':
      description: Requested successfully accepted when doing asynchronous transformation.
      content:
        application/json:
          schema:
            type: object
            properties:
              transaction_id:
                type: string
                nullable: true
              status:
                type: string
                nullabl: false
      headers:
        X-Picsart-Correlation-Id:
          schema:
            type: string
          description: The id which will help for troubleshooting request chain in the system.
        X-Picsart-Ratelimit-Available:
