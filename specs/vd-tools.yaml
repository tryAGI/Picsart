        '415':
          $ref: '#/components/responses/415'
        '422':
          $ref: '#/components/responses/422'
        '429':
          $ref: '#/components/responses/429'
        '431':
          $ref: '#/components/responses/431'
        '500':
          $ref: '#/components/responses/500'
        '503':
          $ref: '#/components/responses/503'
  /export/variable-data-content/{transaction_id}:
    get:
      summary: Get the Export Variable Data Content result
      operationId: vd-export-variable-data-content-getresult
      description: >
        Use this method, along with transaction_id, to retrieve the export variable data content's finished results (e.g. list of PDF file URLs).
      parameters:
        - in: path
          name: transaction_id
          schema:
            type: string
          required: true
