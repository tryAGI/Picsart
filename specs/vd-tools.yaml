openapi: 3.1.0

info:
  version: '2.0'
  title: Picsart Variable Data Content APIs
  description: |
    [Official technical documentation portal](https://docs.picsart.io/)
    [Developer Guidelines](https://picsart.io/terms)
    

servers:
  - url: https://vd-api.picsart.io/v1
    description: Production

paths:
  /export/replay:
    post:
      summary: Export Replay
      operationId: vd-export-replay
      description:  >
        Export your Replays with async API in background to optimize for performance and improve your user experience.
        Now you can export Print-Ready PDF only, but later more formats will be added to the support list.
        Feel free to reach out to our support team if you need updates to this API.
      tags:
        - Replay
      requestBody:
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/FileParameters'
                - $ref: '#/components/schemas/ExportReplayParameters'
      responses:
        '202':
          $ref: '#/components/responses/202'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '405':
          $ref: '#/components/responses/405'
        '413':
          $ref: '#/components/responses/413'
        '415':
          $ref: '#/components/responses/415'
        '422':
          $ref: '#/components/responses/422'
        '429':
          $ref: '#/components/responses/429'
        '431':
          $ref: '#/components/responses/431'
        '500':
          $ref: '#/components/responses/500'
        '503':
          $ref: '#/components/responses/503'
  /export/replay/{transaction_id}:
    get:
      summary: Get the Export Replay result
      operationId: vd-export-replay-getresult
      description: >
        Use this method, along with transaction_id, to retrieve the export replay's finished result (e.g. PDF).
      parameters:
        - in: path
          name: transaction_id
          schema:
            type: string
          required: true
          description: The ID returned from the POST method.
      tags:
        - Replay
      responses:
        '200':
          $ref: '#/components/responses/200'
        '202':
          $ref: '#/components/responses/202'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '405':
          $ref: '#/components/responses/405'
        '413':
          $ref: '#/components/responses/413'
        '422':
          $ref: '#/components/responses/422'
        '415':
          $ref: '#/components/responses/415'
        '429':
          $ref: '#/components/responses/429'
        '431':
          $ref: '#/components/responses/431'
        '500':
          $ref: '#/components/responses/500'
        '503':
          $ref: '#/components/responses/503'
  /variable-data-content/describe:
    post:
      summary: Describe Replay's Variable Data
      operationId: vd-describe-variable-data-content
      description:  >
        Describes the Replay. Lists all variable data fields and their types: image, text, etc.
      tags:
        - Variable Data Content
      requestBody:
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/TemplateParameters'
      responses:
        '200':
          $ref: '#/components/responses/200VariableDataContentDescribe'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '405':
          $ref: '#/components/responses/405'
        '413':
          $ref: '#/components/responses/413'
        '415':
          $ref: '#/components/responses/415'
        '422':
          $ref: '#/components/responses/422'
        '429':
          $ref: '#/components/responses/429'
        '431':
          $ref: '#/components/responses/431'
        '500':
          $ref: '#/components/responses/500'
        '503':
          $ref: '#/components/responses/503'
  /export/variable-data-content:
    post:
      summary: Export Variable Data Content
      operationId: vd-export-variable-data-content
      description:  >
        Export your Replays with async API in background to optimize for performance and improve your user experience.
        
        Customize the output with your data. Here you can provide a CSV file with up to 50 rows and map your data to the variables in the Replay file.
        For each row in the data file, this service will export a file of the requested type.
      tags:
        - Variable Data Content
      requestBody:
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/TemplateParameters'
                #- $ref: '#/components/schemas/FileParameters'
                - $ref: '#/components/schemas/DataFileParameters'
                - $ref: '#/components/schemas/ExportVariableDataContentParameters'
      responses:
        '202':
          $ref: '#/components/responses/202'
        '400':
