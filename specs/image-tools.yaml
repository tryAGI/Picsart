          minLength: 1
          format: uri
    RemoveBackgroundParameters:
      type: object
      properties:
        output_type:
          type: string
          default: cutout
          enum:
            - mask
            - cutout
          description: >
            Select one of the two output options. If you submit a photo of a person, **cutout** returns the person as a sticker while **mask** returns a mask photo of the person.
        bg_image:
          description: Source image file (binary). (If this parameter is present, the other image source parameters must be empty.) This only has an effect when output=cutout.
          type: string
          format: binary
          nullable: true
        bg_image_url:
          type: string
          nullable: true
          description: Source image URL. (If this parameter is present, the other image source parameters must be empty.) If this has a value, the output value is dismissed.
          maxLength: 2083
          minLength: 1
          format: uri
        bg_image_id:
          type: string
          nullable: true
          deprecated: true
          description: Source image ID of an image previously uploaded to Picsart or result image ID from a different API. (If this parameter is present, the other image source parameters must be empty.) See /upload method. If this has a value, the output value is dismissed.
        bg_color:
          type: string
          nullable: true
          description: >
            Can be a hexcolor code (e.g., #82d5fa, #fff) or a color name (e.g., blue). For semi-transparency, 4-/8-digit hexcodes are also supported (e.g., #18d4ff87). (If this parameter is present, the other bg_ parameters must be empty).
        bg_blur:
          type: integer
          default: 0
          minimum: 0
          maximum: 100
          description: Enter an integer value from 0 to +100.
        bg_width:
          type: integer
          description: >
            Size, in pixels, for the width. If left blank, the background is left at its original width.
        bg_height:
          type: integer
          description: >
            Size, in pixels, for the height. If left blank, the background is left at its original height.
        scale:
          type: string
          enum:
            - fit
            - fill
          default: fit
          description: >
            Fit is where the longer side (width/height) fits the background. Fill is where the shorter side fits the background. Fit is the default.
        auto_center:
          type: boolean
          default: false
          description: >
            Automatically center the object. Works only, when output_type=cutout.
              We don't recommend using this flag when the object is visible only partially (e.g. half-cup or half-shoe is in the image).
        stroke_size:
          type: integer
          nullable: true
          default: 0
          minimum: 0
          maximum: 100
          description: >
            Add a solid stroke (border) around the cutout result. Works when output_type=cutout. Set 0 to remove. Takes values from 0 to 100.
        stroke_color:
          type: string
          nullable: true
          default: FFFFFF
          description: >
            Define the color of the stroke. 
              Can be a hexcolor code (e.g., #82d5fa, #fff; with or without #) or a color name (e.g., blue; in English).
              For semi-transparency, 4-/8-digit hexcodes are also supported (e.g., #18d4ff87).
              Gets applied if the stroke_size is 1 and above.
        stroke_opacity:
          type: integer
          nullable: true
          default: 100
          minimum: 0
          maximum: 100
          description: >
            Define the opacity of the stroke added to the cutout result. Works when output_type=cutout and stroke_size is 1 and above.
              Takes values from 0 to 100. Default is 100 (opaque). Set to 0 to make it transparent.
        shadow:
          type: string
          enum:
            - disabled
            - custom
            - bottom-right
            - bottom
            - bottom-left
            - left
            - right
            - top-left
            - top
            - top-right
          default: disabled
          description: >
            A universal parameter to configure the shadow. The default value is "disabled" and it will make sure that the shadow is not rendered.
            The "custom" value allows to define custom position for the shadow, when this value is chosen, the shadow_offset_x and the shadow_offset_y will get applied.
            Other values are shadow directions with preset shadow setup (10px).
        shadow_opacity:
          type: integer
          default: 20
          nullable: true
          minimum: 0
          maximum: 100
          description: Shadow Opacity. Works when shadow is enabled (a non-disabled value).
        shadow_blur:
          type: integer
          default: 50
          nullable: true
          minimum: 0
          maximum: 100
          description: Shadow Blur. Works when shadow is enabled.
        shadow_offset_x:
          type: integer
          nullable: true
          minimum: -100
          maximum: 100
          description: Shadow Offset X. This is mandatory to specify when shadow=custom.
        shadow_offset_y:
          type: integer
          nullable: true
          minimum: -100
          maximum: 100
          description: Shadow Offset Y. This is mandatory to specify when shadow=custom.
        model:
          type: string
          enum:
