paths:
  /removebg:
    post:
      summary: Remove & Change Background
      operationId: image-remove-background
      description: >
        Discover the magic of seamless background removal with our removebg service, powered by cutting-edge AI technology.
        Our sophisticated algorithm effortlessly identifies and isolates the foreground, 
        ensuring every detail from the delicate intricacies of jewelry to the finest strands of hair is captured with unparalleled precision. 
        Designed to excel across a vast array of use cases, our service guarantees immaculate cutouts, 
        whether for professional product photos, dynamic campaign graphics, or personal images meant for creative exploration. 
        Experience flawless edges and exceptional detail preservation every time, elevating your images beyond the ordinary. 
      tags:
        - Remove Background
      requestBody:
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/ImageParameters'
                - $ref: '#/components/schemas/RemoveBackgroundParameters'
      responses:
        '200':
          $ref: '#/components/responses/200'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '402':
