  /upscale/ultra:
    post:
      summary: Ultra Upscale
      operationId: image-ultra-upscale
      description:  >
        *Upscale Ultra* is a new upscaling technique which does upscaling with noise suppression.
        It works well on images with faces, small resolution images, stickers and objects with geometric shapes and clear edges.
        Upscale ultra increases the quality and resolution of low quality photos by leveraging predictive and generative AI technology in order to "complete" missing pixels for a best in class smoothing and enhancement effect.
        It works especially good on small resolution images with faces.
      tags:
        - Photo enhancement
      requestBody:
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/ImageParameters'
                - $ref: '#/components/schemas/UpscaleUltraParameters'
