        - segment
      type: object
      properties:
        segment:
          type: string
          maxLength: 90
          minLength: 1
          description: >
            The segment to add the blur effect to.

            Use either 'foreground', or 'background', or define the name of the segments such as 'faces' or 'car plates'.

            Recommendation: use short and clear names of the segment (e.g. object or area).
            We don't recommend using long prompts.
        blur:
          type: integer
          minimum: 1
          maximum: 100
          description: The blur amount to add.
          default: 50
        format:
          type: string
          default: JPG
          enum:
            - JPG
            - PNG
            - WEBP
          description: >
