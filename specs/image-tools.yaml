          minLength: 1
          format: uri
    StyleTransferParameters:
      type: object
      properties:
        level:
          type: string
          default: l1
          enum:
            - l1
            - l2
            - l3
            - l4
            - l5
          description: >
            Select a level from the dropdown menu. Smaller numbers preserve more from the original image, bigger numbers make the original image look closer to the reference image. The level options are as follows.
              * l1
              * l2
              * l3
              * l4
              * l5
        format:
