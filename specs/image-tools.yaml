              * JPG
              * PNG
              * WEBP
    SmartCropParameters:
      required:
        - segment
      type: object
      properties:
        segment:
          type: string
          maxLength: 90
          minLength: 1
          description: >
            The segment to crop.

            Use either 'foreground', or define the name of the segments such as 'hat' or 'boots'.

            Recommendation: use short and clear names of the segment (e.g. object or area).
            We don't recommend using long prompts.
        ratio:
          type: string
          enum:
            - '1:1'
            - '4:3'
            - '3:2'
            - '16:9'
            - '21:9'
            - '4:5'
            - '9:16'
            - '2:3'
            - '5:4'
          description: >
            Optionally enforce the ration of the result image. When both width and height parameters are provided, they should match this ratio.

            In case either width or height are provided, the other value will be calculated based on this ratio.
        width:
          type: integer
          description: Specify the width of the output image in pixels.
          minimum: 0
        height:
          type: integer
          description: Specify the height of the output image in pixels. The default is 1024 and the maximum acceptable value is 8000.
          minimum: 0
        margin:
          type: integer
          minimum: 0
          maximum: 100
          description: >
            The margin to add around the crop segment. Values are defined in pixels.

            When ratio is provided, that is applied after the margin is applied to guarantee the minimum gap before the edge of the image.
          default: 0
        format:
          type: string
          default: JPG
          enum:
            - JPG
            - PNG
            - WEBP
          description: >
            Optionally select one of the image formats. Options are as follows:
              * JPG
              * PNG
              * WEBP
