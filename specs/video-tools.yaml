            - fade
            - zoom_in
            - zoom_out
            - spin
            - fly_in_from_left
            - fly_in_from_right
            - fly_in_from_top
            - fly_in_from_bottom
            - fly_out_to_left
            - fly_out_to_right
            - fly_out_to_bottom
            - fly_out_to_top
    ConcatParameters:
      type: object
      properties:
        items:
          type: array
          description: List of videos and images to combine into a slideshow.
          items:
            allOf:
              - $ref: '#/components/schemas/ConcatVideoParameters'
              - $ref: '#/components/schemas/ConcatImageParameters'
              - $ref: '#/components/schemas/Transition'
          minItems: 1
          maxItems: 10
        bg_audio_url:
          type: string
          description: Background audio/sound URL.
          maxLength: 2083
          minLength: 1
          format: uri
          nullable: true
        bg_audio_repeat:
          type: boolean
          default: true
          nullable: true
          description: Use true to repeat the audion in the background for the whole video duration or false if you want to play the audio only once.
        bg_audio_volume:
          type: integer
          default: 100
          minimum: 0
          maximum: 100
          nullable: true
          description: Control the audio volume. Adjust from 0 to 100. 0 will mute the audio completely and 100 will have it at max.
    ConcatVideoParameters:
      type: object
      properties:
        video_url:
          type: string
          description: Source video URL. (Use either image_url or video_url.)
          maxLength: 2083
          minLength: 1
          format: uri
          nullable: true
        volume:
          type: integer
          default: 100
          minimum: 0
          maximum: 100
          nullable: true
          description: Control the video volume. Adjust from 0 to 100. 0 will mute the video completely and 100 will have it at max.
    ConcatImageParameters:
      type: object
      properties:
        image_url:
          type: string
          description: Source image URL. (Use either image_url or video_url.)
          maxLength: 2083
          minLength: 1
          format: uri
          nullable: true
        scale:
          type: string
          enum:
            - fit
            - fill
          default: fit
          nullable: true
          description: >
            Fit is where the longer side (width/height) fits the video canvas (e.g. see the width and height params). Fill is where the shorter side fits the background. Fit is the default.
        duration:
          type: integer
          minimum: 1
          default: 1000
          description: Duration of the image in milliseconds. Applies only if the image_url is provided.
          nullable: true
    ConcatSegmentsParameters:
      type: object
      properties:
        trim_segments:
          type: array
          description: List of segments to combine/merge.
          items:  
            type: object
            properties: 
              start:
                type: integer
                default: 0
                minimum: 0
                nullable: false
                description: The start time of the segment in milliseconds.
              end:
                type: integer
                minimum: 1
                nullable: false
                description: The end time of the segment in milliseconds.
              transition:
                type: string
                enum:
                  - none
                  - fade
                  - zoom_in
                  - zoom_out
                  - spin
                  - fly_in_from_left
                  - fly_in_from_right
                  - fly_in_from_top
                  - fly_in_from_bottom
                  - fly_out_to_left
                  - fly_out_to_right
                  - fly_out_to_bottom
                  - fly_out_to_top
                default: 'none'
                nullable: true
                description: The transition between segments.
            required:
              - start
              - end
          minItems: 2
          maxItems: 10
    FitParameters:
      type: object
      properties:
        ratio:
          type: number
          format: float
          nullable: true
          minimum: 0.1
          maximum: 10.0
          description: >
            The value should be a single floating point number which represents the ratio of width and height. The formula is: parameter value = width / height. The default value is that of the original video.
        width:
          type: integer
          minimum: 16
          nullable: true
          description: >
            Width of the outcome video. If the new width is larger than the original width, the blurry mirror effect should be applied to the additional part. The measurement unit is px. The default value is the original width. Value must be at least 16 px.
        height:
          type: integer
          minimum: 16
          nullable: true
          description: >
            Height of the outcome video. If the new height is larger than the original height, the blurry mirror effect should be applied to the additional part. The measurement unit is px. The default value is the original height. Value must be at least 16 px.
        bg_color:
          type: string
          nullable: true
          description: >
            Can be a hexcolor code (e.g., #82d5fa, #fff) or a color name (e.g., blue). For semi-transparency, 4-/8-digit hexcodes are also supported (e.g., #18d4ff87). (If this parameter is present, the other bg_ parameters must be empty).
        bg_blur:
          type: integer
          default: 0
          minimum: 0
          maximum: 100
          description: Enter an integer value from 0 to 100.
        bg_image_url:
          type: string
          description: Background image URL.
          maxLength: 2083
          minLength: 1
          format: uri
        bg_video_url:
          type: string
          description: Background video URL.
          maxLength: 2083
          minLength: 1
          format: uri
    WatermarkParameters:
      type: object
      properties:
        watermark:
          description: Source watermark image file (binary). (If this parameter is present, the other watermark image source parameters must be empty.)
          type: string
          format: binary
          nullable: true
        watermark_url:
          type: string
          description: Source watermark image URL. (If this parameter is present, the other watermark image source parameters must be empty.)
          maxLength: 2083
          minLength: 1
          format: uri
          nullable: true
        anchor_point:
          type: string
          default: center-middle
          enum:
            - left-top
            - left-middle
            - left-bottom
            - center-top
            - center-middle
            - center-bottom
            - right-top
            - right-middle
            - right-bottom
            - pattern
        watermark_width:
          type: integer
          minimum: 1
          nullable: true
        watermark_height:
          type: integer
          minimum: 1
          nullable: true
        watermark_opacity:
          type: integer
          nullable: true
          default: 50
          minimum: 0
          maximum: 100
          description: >
            Define the opacity of the watermark. Takes values from 0 to 100. Default is 100 (opaque). Set to 0 to make it transparent.
        watermark_angle:
          type: integer
          minimum: 0
          maximum: 360
          nullable: true
          description: >
            Define the angle of the watermark. Takes values from 0 to 360.
        watermark_padding_x:
          type: integer
          minimum: 0
          default: 0
          nullable: true
          description: >
            Define the horizontal padding of the watermark.
        watermark_padding_y:
          type: integer
          minimum: 0
          default: 0
          nullable: true
          description: >
            Define the vertical padding of the watermark.
