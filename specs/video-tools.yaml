openapi: 3.0.0

info:
  version: '1.0'
  title: Picsart Programmable Video APIs
  description: |
    [Official technical documentation portal](https://docs.picsart.io/)
    [Developer Guidelines](https://picsart.io/terms)

servers:
  - url: https://video-api.picsart.io/v1
    description: Production

paths:
  /upscale/fps:
    post:
      summary: Video FPS Upscale
      operationId: video-upscale-fps
      description:  >
        Upscale your low FPS videos to 60FPS high-quality videos using Generative AI technology.
      tags:
        - Video enhancement
      requestBody:
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/VideoParameters'
      responses:
        '202':
          $ref: '#/components/responses/202'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
