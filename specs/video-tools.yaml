security:
  - apiKey: []

components:
  schemas:
    FileParameters:
      type: object
      properties:
        file_url:
          type: string
          description: Source video or audio URL.
          maxLength: 2083
          minLength: 1
          format: uri
    TranscribeFileParameters:
      type: object
      properties:
        file_url:
          type: string
          description: Source video or audio URL. The maximum file size is 25mb.
          maxLength: 2083
          minLength: 1
          format: uri
    VideoParameters:
      type: object
      properties:
        video_url:
          type: string
          description: Source video URL.
          maxLength: 2083
          minLength: 1
          format: uri
    ImageParameters:
      type: object
      properties:
        image:
          description: Source image file (binary). (If this parameter is present, the other image source parameters must be empty.)
          type: string
          format: binary
        image_url:
          type: string
          description: Source image URL. (If this parameter is present, the other image source parameters must be empty.)
          maxLength: 2083
          minLength: 1
          format: uri
    ExportParameters:
      type: object
      properties:
        export:
          type: object
          properties: 
            format:
              type: string
              default: MP4
              enum:
                - MOV
                - MP4
                - WEBM
                - GIF
              description: >
                Optionally select one of the output video formats (MP4 is chosen if left blank). Container options are as follows
                  * MOV
                  * MP4
                  * WEBM
                  * GIF
            frame_rate:
              type: integer
              default: 30
              minimum: 1
              maximum: 60
              description: The output video frame rate.
            bitrate:
              type: integer
              minimum: 1
              maximum: 10000
              description: The output video bitrate in kb/s. Leave empty to set automatically and optimize accordingly.
          default:
            format: MP4
            frame_rate: 30
    ExtendedExportParameters:
      type: object
      properties:
        export:
          type: object
          properties: 
            format:
              type: string
              default: MP4
              enum:
                - MOV
                - MP4
                - WEBM
                - GIF
              description: >
                Optionally select one of the output video formats (MP4 is chosen if left blank). Container options are as follows
                  * MOV
                  * MP4
                  * WEBM
                  * GIF
            max_size_mb:
              type: integer
              nullable: true
              description: The maximum target size in megabytes (not strict).
            quality:
              type: string
              enum:
                - low
                - medium
                - high
              default: medium
              description: The quality of the output video. You can choose from low, medium or high quality outputs. By default medium is applied.
            codec:
              type: string
              enum:
                - default
                - HEVC
                - h264
                - theora
                - vp8
                - vp9
                - gif
                - av1
                - cinepak
                - ffv1
                - MPEG4
                - vc2
              default: default
              description: The video codec. Use "default" to keep the video codec the same.
            audio_codec:
              type: string
              enum:
                - default
                - aac
                - ac3
                - opus
                - mp3
                - ogg_vorbis
                - ogg_speex
                - wav
                - flac
                - PCM
              default: default
              description: The audio codec. Use "default" to keep the video codec the same.
            frame_rate:
              type: integer
              default: 30
              minimum: 1
              maximum: 60
              description: The output video frame rate.
            bitrate:
              type: integer
              minimum: 1
              maximum: 10000
              description: The output video bitrate in kb/s. Leave empty to set automatically and optimize accordingly.
            color_space:
              type: string
              enum:
                - SRGB
                - DisplayP3
              default: SRGB
              description: The color space of the output video.
          default:
            format: MP4
            quality: medium,
            codec: default,
            audio_codec: default,
            frame_rate: 30,
            color_space: SRGB
    RemoveBackgroundParameters:
      type: object
      properties:
        bg_color:
          type: string
          nullable: true
          description: >
            Can be a hexcolor code (e.g., #82d5fa, #fff) or a color name (e.g., blue).
            For full transparency, use 'transparent' or '#00000000'. In this case, the export format .webm will be enforced and applied.
            For semi-transparency, 4-/8-digit hexcodes are also supported (e.g., #18d4ff87 or #00000066).
            The default is greenscreen's '#008800'.
            Use either bg_color or bg_image_url.
          default: '#008800'
        bg_image_url:
          type: string
          nullable: true
          description: >
            The background image URL.
            Use either bg_color or bg_image_url.
            When not provided the default value of the bg_color=#008800 will be applied to the background.
          maxLength: 2083
          minLength: 1
          format: uri
    TranscribeParameters:
      type: object
      properties:
        language:
          type: string
