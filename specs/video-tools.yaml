    TrimParameters:
      type: object
      properties:
        start:
          type: integer
          default: 0
          minimum: 0
          description: This is the point in time of the video from where the trimming begins in milliseconds.
        end:
          type: integer
          default: 1000
          minimum: 1000
          description: This is the point in time of the video where the trimming ends in milliseconds. It must be greater than `start`.
      required:
        - start
        - end
    CropParameters:
      type: object
      properties:
        width:
          type: integer
          minimum: 16
          description: >
            Width of the outcome video. If the new width is larger than the original width, the blurry mirror effect should be applied to the additional part. The measurement unit is px. The default value is the original width. Value must be at least 16 px.
        height:
          type: integer
          minimum: 16
          description: >
            Height of the output video. If the new height is larger than the original height, the blurry mirror effect should be applied to the additional part. The measurement unit is px. The default value is the original height. Value must be at least 16 px.
        start_x:
          type: integer
          default: 0
          minimum: 0
          description: The starting x location of the crop in px as measured from the left edge.
        start_y:
          type: integer
          default: 0
          minimum: 0
          description: The starting y location of the crop in px as measured from the bottom edge.
    EditParameters:
      type: object
      properties:
        fit:
          $ref: '#/components/schemas/FitParameters'
        crop:
          $ref: '#/components/schemas/CropParameters'
        #- $ref: '#/components/schemas/EffectsParameters'
        #- $ref: '#/components/schemas/TrimParameters'
    VideoGetThumbnailParameters:
      type: object
      properties:
        source:
          type: string
          default: auto
          enum:
            - auto
            - container
            - timestamp
        timestamps:
          type: array
          items:
