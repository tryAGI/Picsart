                  timeElapsed: 0.0
                  timeEstimate: null
                  progress: 33
                  error: null
                  result: ''
            done:
              value:
                jobs:
                - id: '{jobGuid}'
                  status: done
                  timeElapsed: 0.0
                  timeEstimate: null
                  progress: 100
                  error: null
