          description: Overlay image ID of an image previously uploaded to Picsart or result image ID from a different API. (If this parameter is present, the other image source parameters must be empty.)
            See /upload method. If this has a value, the output value is dismissed.
        opacity:
          type: integer
          nullable: true
          default: 100
          minimum: 0
          maximum: 100
          description: "Define the opacity of the overlay added to the main image.\n  Takes values from 0 to 100. Default is 100 (opaque). Set to 0 to make it transparent.\n"
        blend_mode:
          type: string
          enum:
          - normal
          - darken
          - multiply
