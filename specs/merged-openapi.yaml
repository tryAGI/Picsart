          minLength: 1
          format: uri
          nullable: true
        scale:
          type: string
          enum:
          - fit
          - fill
          default: fit
          nullable: true
          description: 'Fit is where the longer side (width/height) fits the video canvas (e.g. see the width and height params). Fill is where the shorter side fits the background. Fit is the default.

            '
        duration:
          type: integer
          minimum: 1
          default: 1000
          description: Duration of the image in milliseconds. Applies only if the image_url is provided.
          nullable: true
    VideoConcatSegmentsParameters:
      type: object
      properties:
        trim_segments:
          type: array
          description: List of segments to combine/merge.
          items:
            type: object
            properties:
              start:
                type: integer
                default: 0
                minimum: 0
                nullable: false
                description: The start time of the segment in milliseconds.
              end:
                type: integer
                minimum: 1
                nullable: false
                description: The end time of the segment in milliseconds.
              transition:
                type: string
                enum:
                - none
                - fade
                - zoom_in
                - zoom_out
                - spin
                - fly_in_from_left
                - fly_in_from_right
                - fly_in_from_top
                - fly_in_from_bottom
                - fly_out_to_left
                - fly_out_to_right
                - fly_out_to_bottom
                - fly_out_to_top
                default: none
                nullable: true
                description: The transition between segments.
            required:
            - start
            - end
          minItems: 2
          maxItems: 10
    VideoFitParameters:
      type: object
      properties:
        ratio:
          type: number
          format: float
          nullable: true
          minimum: 0.1
          maximum: 10.0
          description: 'The value should be a single floating point number which represents the ratio of width and height. The formula is: parameter value = width / height. The default value is that of
            the original video.

            '
        width:
          type: integer
          minimum: 16
          nullable: true
          description: 'Width of the outcome video. If the new width is larger than the original width, the blurry mirror effect should be applied to the additional part. The measurement unit is px. The
            default value is the original width. Value must be at least 16 px.

            '
        height:
          type: integer
          minimum: 16
          nullable: true
          description: 'Height of the outcome video. If the new height is larger than the original height, the blurry mirror effect should be applied to the additional part. The measurement unit is px.
            The default value is the original height. Value must be at least 16 px.

            '
        bg_color:
          type: string
          nullable: true
          description: 'Can be a hexcolor code (e.g., #82d5fa, #fff) or a color name (e.g., blue). For semi-transparency, 4-/8-digit hexcodes are also supported (e.g., #18d4ff87). (If this parameter is
            present, the other bg_ parameters must be empty).

            '
        bg_blur:
          type: integer
          default: 0
          minimum: 0
          maximum: 100
          description: Enter an integer value from 0 to 100.
        bg_image_url:
          type: string
          description: Background image URL.
          maxLength: 2083
          minLength: 1
          format: uri
        bg_video_url:
          type: string
          description: Background video URL.
          maxLength: 2083
          minLength: 1
          format: uri
