openapi: 3.0.0
info:
  title: Picsart API
  version: '2.0'
  description: 'Unified Picsart API combining Image Tools, Video Tools, GenAI, and Variable Data Content APIs.

    [Official documentation](https://docs.picsart.io/)

    [Developer Guidelines](https://picsart.io/terms)

    '
servers:
- url: https://api.picsart.io
  description: Production
paths:
  /image/removebg:
    post:
      summary: Remove & Change Background
      operationId: image-remove-background
      description: "Discover the magic of seamless background removal with our removebg service, powered by cutting-edge AI technology. Our sophisticated algorithm effortlessly identifies and isolates the\
        \ foreground,  ensuring every detail from the delicate intricacies of jewelry to the finest strands of hair is captured with unparalleled precision.  Designed to excel across a vast array of use\
        \ cases, our service guarantees immaculate cutouts,  whether for professional product photos, dynamic campaign graphics, or personal images meant for creative exploration.  Experience flawless edges\
        \ and exceptional detail preservation every time, elevating your images beyond the ordinary. \n"
      tags:
      - 'Image: Remove Background'
      requestBody:
        content:
          multipart/form-data:
            schema:
              allOf:
              - $ref: '#/components/schemas/ImageImageParameters'
              - $ref: '#/components/schemas/ImageRemoveBackgroundParameters'
      responses:
        '200':
          $ref: '#/components/responses/Image200'
        '400':
          $ref: '#/components/responses/Image400'
        '401':
          $ref: '#/components/responses/Image401'
        '402':
          $ref: '#/components/responses/Image402'
        '403':
          $ref: '#/components/responses/Image403'
        '404':
          $ref: '#/components/responses/Image404'
        '405':
          $ref: '#/components/responses/Image405'
        '413':
          $ref: '#/components/responses/Image413'
        '415':
          $ref: '#/components/responses/Image415'
        '422':
          $ref: '#/components/responses/Image422'
        '429':
          $ref: '#/components/responses/Image429'
        '431':
          $ref: '#/components/responses/Image431'
        '500':
          $ref: '#/components/responses/Image500'
        '503':
          $ref: '#/components/responses/Image503'
  /image/upscale:
    post:
      summary: Upscale
      operationId: image-upscale
      description: 'The *upscale* service increases the resolutions of an image by a given upscale factor, without increasing its file size. Upscale increases the quality and resolution of your photos by
        leveraging predictive and generative AI to add pixels to your image. It works especially well on images without noise.

        '
      tags:
      - 'Image: Photo enhancement'
      requestBody:
        content:
          multipart/form-data:
            schema:
              allOf:
              - $ref: '#/components/schemas/ImageImageParameters'
              - $ref: '#/components/schemas/ImageUpscaleParameters'
      responses:
        '200':
          $ref: '#/components/responses/Image200'
        '400':
