          maxLength: 2083
          minLength: 1
          format: uri
        mask_id:
          type: string
          deprecated: true
          description: Source mask ID of an mask previously uploaded to Picsart or result mask ID from a different API. (If this parameter is present, the other mask source parameters must be empty.)
        sticker:
          description: Source sticker file (binary). (If this parameter is present, the other sticker source parameters must be empty.)
          type: string
          format: binary
        sticker_url:
          type: string
          description: Source sticker URL. (If this parameter is present, the other sticker source parameters must be empty.)
          maxLength: 2083
          minLength: 1
          format: uri
        sticker_id:
          type: string
          deprecated: true
          description: Source sticker ID of an sticker previously uploaded to Picsart or result sticker ID from a different API. (If this parameter is present, the other sticker source parameters must be
            empty.)
        format:
          type: string
          default: JPG
          enum:
          - JPG
          - PNG
          - WEBP
          description: "Optionally select one of the image formats (JPG is chosen if left blank). Options are as follows:\n  * JPG\n  * PNG\n  * WEBP\n"
    ImageFaceEnhanceParameters:
      type: object
      properties:
        format:
          type: string
          default: JPG
          enum:
          - JPG
          - PNG
          - WEBP
          description: "Optionally select one of the image formats (JPG is the default). Options are as follows:\n  * JPG\n  * PNG\n  * WEBP\n"
    ImageEditParameters:
      type: object
      properties:
        format:
          type: string
          default: JPG
          enum:
          - JPG
          - PNG
          - WEBP
          description: "Optionally select one of the image formats (JPG is chosen if left blank). Options are as follows:\n  * JPG\n  * PNG\n  * WEBP\n"
        mode:
          type: string
          nullable: true
          enum:
          - resize
          - crop
          description: For *crop* mode, the outcome image will be center-cropped with the given size (width, height). For the *resize* mode, the smallest size will be fitted to preserve the original proportion
            of the image. When the outcome size is not provided with width and height, no cropping or resizing will be applied (see alternative options such as rotate, flip and perspective).
        size:
          type: integer
          nullable: true
          description: When defined, this parameter overrides and applies the value for both width and height.
        width:
          type: integer
          description: Width of outcome image. If the provided width is larger than the original width of the file, the original size of the image will be selected. When crop size is defined, but the x,y
            starting position is not provided, the crop will be a center-crop (i.e., equally cutting from each side).
          nullable: true
        height:
          type: integer
          description: Height of outcome image. If the provided height is larger than the original width of the file, the original size of the image will be selected. When crop size is defined, but the
            x,y starting position is not provided, the crop will be a center-crop (i.e, equally cutting from each side).
          nullable: true
        crop_x:
          type: integer
          nullable: true
          description: 'crop_x, toghether with crop_y, define the anchor point of the crop. This point will be the center of the crop area. The top-left corner corresponds to (0,0) point and the bottom-right
            corner corresponds to (widht,height) point.

            '
        crop_y:
          type: integer
          nullable: true
          description: 'crop_y, toghether with crop_x, define the anchor point of the crop. This point will be the center of the crop area. The top-left corner corresponds to (0,0) point and the bottom-right
            corner corresponds to (widht,height) point.

            '
        crop_anchor:
          type: string
          enum:
          - center
          - top-left
          - top-right
          - bottom-left
          - bottom-right
          default: center
          nullable: true
          description: "By default when crop_anchor or crop_x,crop_y pair are not provided, the crop will be done around the center of the image. This parameter is an easier option to crop_x,crop_y pair\
            \ where the respective corner of the image will be cropped. Options for crop anchor are as follows:\n  * center\n  * top-left\n  * top-right\n  * bottom-left\n  * bottom-right\n"
        flip:
          type: string
          enum:
          - horizontal
          - vertical
          description: Choose a way to flip the image.
        rotate:
          type: number
          format: float
          default: 0.0
          minimum: -180.0
          maximum: 180.0
          description: Enter a float value to rotate the image from -180 to +180. Default is 0.
        perspective_horizontal:
          type: integer
          default: 0
          minimum: -45
          maximum: 45
          description: The horizontal perspective after edits.
        perspective_vertical:
          type: integer
          default: 0
          minimum: -45
          maximum: 45
          description: The vertical perspective after edits.
        quality:
          type: integer
          default: 90
          minimum: 10
          maximum: 100
          description: This refers to the level of accuracy of the image processing. The greater the quality (i.e., the larger the number), the larger the image file size. The default value is 90, which
            is a good compromise between quality and file size.
    ImageOverlayParameters:
      type: object
      properties:
        overlay_image:
          description: Overlay image file (binary). (If this parameter is present, the other image source parameters must be empty.) This only has an effect when output=cutout.
          type: string
          format: binary
          nullable: true
        overlay_image_url:
          type: string
          nullable: true
