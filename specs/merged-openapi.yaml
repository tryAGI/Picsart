  /image/upscale/enhance:
    post:
      summary: Ultra Enhance
      operationId: image-ultra-enhance
      description: "*Ultra enhance* is a new upscaling technique with a generative model which provides high frequency detail. It works well on images without noise and preserves details in a superior way.\n\
        **Limitations:** \n\n **Minimums/Maximums:**\n   * Up to 64Mpx output images\n\n **Examples:**\n   Examples of where ultra enhance can be utilized include the following:\n   * Low resolution images\n\
        \   * Images that need smoothing and realistic details \n   * To de-noise an image\n   * Works best with the Face Enhance service\n\n **Source Image:**\n   If you plan to upscale enhance an image\
        \ several times, we recommend you first upload the source image using the *Upload* method and then use the reference image ID. Otherwise, you can source the image by providing a file or a URL to\
        \ an online image.\n"
      tags:
      - 'Image: Photo enhancement'
      requestBody:
        content:
          multipart/form-data:
