                      type: string
                      nullable: true
                    status:
                      description: "The status of the rendering. Supported values are\n  * rendering\n  * done\n  * error\n"
                      type: string
                      enum:
                      - rendering
                      - done
                      - error
                      nullable: false
                    timeElapsed:
                      description: The time elapsed since the rendering started.
                      type: number
                      minimum: 0.0
                      format: float
                      nullable: true
                    timeEstimate:
                      type: string
                      nullable: true
                    progress:
                      description: The progress of the rendering in the range of 0-100 where 0 means it's just starting and 100 means it's complete.
                      type: integer
                      minimum: 0
                      maximum: 100
                      example: 15
                      nullable: true
                    error:
                      type: string
                      nullable: true
                    result:
                      description: URL of the result video.
                      type: string
                      example: https://{base_url}/{jobGuid}/output/{jobGuid}.mp4
                      nullable: true
          examples:
            rendering:
              value:
