        '422':
          $ref: '#/components/responses/Image422'
        '429':
          $ref: '#/components/responses/Image429'
        '431':
          $ref: '#/components/responses/Image431'
        '500':
          $ref: '#/components/responses/Image500'
        '503':
          $ref: '#/components/responses/Image503'
  /image/upscale/ultra:
    post:
      summary: Ultra Upscale
      operationId: image-ultra-upscale
      description: '*Upscale Ultra* is a new upscaling technique which does upscaling with noise suppression. It works well on images with faces, small resolution images, stickers and objects with geometric
        shapes and clear edges. Upscale ultra increases the quality and resolution of low quality photos by leveraging predictive and generative AI technology in order to "complete" missing pixels for a
        best in class smoothing and enhancement effect. It works especially good on small resolution images with faces.

        '
      tags:
      - 'Image: Photo enhancement'
      requestBody:
        content:
          multipart/form-data:
            schema:
              allOf:
              - $ref: '#/components/schemas/ImageImageParameters'
              - $ref: '#/components/schemas/ImageUpscaleUltraParameters'
      responses:
