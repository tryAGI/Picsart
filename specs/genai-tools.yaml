        prompt:
          type: string
          description: 'The prompt. Only apply if you are confident the provided prompt is going to generate good results. Otherwise leave empty as the default prompt is already optimized for bleed generation.'
        negative_prompt:
          type: string
          description: The negative prompt (don’t generate this type of images). Don't use the nagitve keywords such as 'no', e.g. don't use 'no distorted faces', use 'distorted faces'.
          deprecated: true
        bleed_size:
          type: integer
          description: >
