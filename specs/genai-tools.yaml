openapi: 3.0.0

info:
  version: '1.0'
  title: Picsart GenAI API
  description: |
    [Official technical documentation portal](https://docs.picsart.io/)
    [Developer Guidelines](https://picsart.io/terms)

servers:
  - url: https://genai-api.picsart.io/v1
    description: Production

paths:
  /text2text/chat/completions:
    post:
      summary: Text2Text Completions
      operationId: genai-text2text-completions
      description: >
         The *Text2Text Completion* service helps generate a text based on the text introduced as input by the user.
         It also takes the pain out of writing to give your social, marketing, and advertising copy a premium edge.
      tags:
        - Text2Text
      requestBody:
        content:
          application/json:
            schema:
              allOf:
               - $ref: '#/components/schemas/Text2TextCompletionsParameters'
               - $ref: '#/components/schemas/Text2TextModels'
      responses:
        '200':
          $ref: '#/components/responses/Text2TextResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '405':
          $ref: '#/components/responses/405'
        '413':
          $ref: '#/components/responses/413'
        '415':
          $ref: '#/components/responses/415'
        '429':
          $ref: '#/components/responses/429'
        '431':
          $ref: '#/components/responses/431'
        '500':
          $ref: '#/components/responses/500'
        '503':
          $ref: '#/components/responses/503'
  /text2image:
    post:
      summary: Text2Image
      operationId: genai-text2image
      description: >
        The *Text2Image* service helps generate an image based on the text introduced as input by the user.

        The result images can be as big as 1024x1024 pixels.
      tags:
        - Text2Image
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/Text2ImageParameters'
                - $ref: '#/components/schemas/Text2ImageModels'
      responses:
        '202':
          $ref: '#/components/responses/Text2ImageResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '405':
          $ref: '#/components/responses/405'
        '413':
          $ref: '#/components/responses/413'
        '415':
          $ref: '#/components/responses/415'
        '429':
