security:
  - apiKey: []

components:
  schemas:
    Text2TextCompletionsParameters:
      required:
        - messages
      type: object
      properties:
        messages:
          type: array
          description: 'The messages containing the original text and instructions.'
          items:
            type: object
            properties:
              role:
                type: string
                description: >
                  Each message object has a role (either system, user, or assistant) and content.
                  
                  The system message is optional and can be used to set the behavior of the assistant
                  The user messages provide requests or comments for the assistant to respond to
                  Assistant messages store previous assistant responses, but can also be written by you to give examples of desired behavior.
              content:
                type: string
        max_tokens:
          type: number
          default: 512
        temperature:
          type: number
          default: 1
    Text2TextModels:
      type: object
      properties:
        model:
          type: string
          enum:
            - urn:air:openai:model:openai:gpt-5@1
            - urn:air:openai:model:openai:gpt-5-search-api@1
            - urn:air:openai:model:openai:gpt-5.1@1
            - urn:air:openai:model:openai:gpt-5.1-chat@1
            - urn:air:openai:model:openai:gpt-5.2@1
            - urn:air:openai:model:openai:gpt-5-mini@1
            - urn:air:openai:model:openai:gpt-5-nano@1
            - urn:air:openai:model:openai:gpt-4o@1
            - urn:air:openai:model:openai:gpt-4o-mini@1
            - urn:air:openai:model:openai:gpt-4o-search-preview@1
            - urn:air:openai:model:openai:gpt-4-turbo@1
            - urn:air:openai:model:openai:gpt-4.1@1
            - urn:air:openai:model:openai:gpt-4.1-mini@1
            - urn:air:openai:model:openai:gpt-4.1-nano@1
            - urn:air:openai:model:openai:gpt-3.5-turbo@1
            - urn:air:anthropic:model:anthropic:claude-sonnet-4-5-latest@1
            - urn:air:google:model:google:gemini-2.0-flash-001@1
            - urn:air:google:model:google:gemini-2.0-flash-lite@1
            - urn:air:google:model:google:gemini-2.5-pro@1
            - urn:air:google:model:google:gemini-2.5-flash@1
            - urn:air:google:model:google:gemini-3-pro-preview@1
          nullable: true
          default: 'urn:air:openai:model:openai:gpt-4o-mini@1'
          description: >
            Optionally choose a specific AI model to use for this request.
            
            If not specified, a default model will be applied. Please note that the default model may change over time as Picsart continues to improve performance and accuracy.
            Any change to the default will be made only after thorough testing and validation to ensure it delivers better results.

            If you require consistent behavior or wish to evaluate different models on your own, we recommend explicitly setting this parameter.
    Text2ImageParameters:
      required:
        - prompt
      type: object
      properties:
        prompt:
          type: string
          description: 'The prompt.'
        negative_prompt:
          type: string
          description: The negative prompt (don’t generate this type of images). Don't use the nagitve keywords such as 'no', e.g. don't use 'no distorted faces', use 'distorted faces'.
          deprecated: true
        width:
          type: number
          description: >
            Desired width used to determine the aspect ratio and resolution tier.
            The actual output width is determined by the AI provider based on the closest matching supported aspect ratio.
            
            Supported ratios vary by model (common: 1:1, 4:3, 3:4, 16:9, 9:16, 21:9).
          example: 512
          default: 1024
          maximum: 1024
          minimum: 64
        height:
          type: number
          description: >
            Desired height used to determine the aspect ratio and resolution tier.
            The actual output height is determined by the AI provider based on the closest matching supported aspect ratio.
            
            Supported ratios vary by model (common: 1:1, 4:3, 3:4, 16:9, 9:16, 21:9).
          example: 512
          default: 1024
          maximum: 1024
          minimum: 64
        count:
          type: number
          default: 2
          minimum: 1
          maximum: 10
          description: 'The number of images to generate.'
    Text2VideoParameters:
      required:
        - prompt
      type: object
      properties:
        prompt:
          type: string
          description: 'The prompt.'
        width:
          type: number
          description: >
            Desired width used to determine the aspect ratio and resolution tier.
            The actual output width is determined by the AI provider based on the closest matching supported aspect ratio.
            
            Supported ratios vary by model (common: 1:1, 4:3, 3:4, 16:9, 9:16, 21:9).
          example: 512
          default: 1024
          maximum: 1024
          minimum: 64
        height:
          type: number
          description: >
            Desired height used to determine the aspect ratio and resolution tier.
            The actual output height is determined by the AI provider based on the closest matching supported aspect ratio.
            
            Supported ratios vary by model (common: 1:1, 4:3, 3:4, 16:9, 9:16, 21:9).
          example: 512
          default: 1024
          maximum: 1024
          minimum: 64
        quality:
          type: string
          description: Video output quality/resolution.
          enum: 
            - 480p
            - 720p
            - 1080p
          default: '480p'
        audio:
          type: boolean
          default: false
          description: >
            Generate the video with audio or not.

            Some models (e.g. Grok Imagine Video / OpenAI Sora 2 / Sora 2 Pro / OVI) don't support the option to disable sound.
            With these models the result video will always be generated regardless to the provided input params.
        length:
          type: number
          description: >
            Desired video length in seconds. Mapped to the closest supported duration for the selected model.
          default: 3
          maximum: 20
          minimum: 1
    Text2SpeechParameters:
      required:
        - text
      type: object
      properties:
        text:
          type: string
          description: 'The text to speak. Up to 5000 characters.'
          nullable: false
        language:
          type: string
          description: >
            The language to speak.
          enum:
            - en
            - fr
          default: 'en'
    Text2SpeechModels:
      type: object
      properties:
        model:
          type: string
          enum: 
            - urn:air:openai:model:openai:tts-1@1
            - urn:air:elevenlabs:model:elevenlabs:eleven-v3@1
            - urn:air:async:model:async:async-flash-v1.0@1
          nullable: true
          default: 'urn:air:openai:model:openai:tts-1@1'
          description: >
            Optionally choose a specific AI model to use for this audio generation.
            
            If not specified, a default model will be applied. Please note that the default model may change over time as Picsart continues to improve performance and accuracy.
            Any change to the default will be made only after thorough testing and validation to ensure it delivers better results.

            If you require consistent behavior or wish to evaluate different models on your own, we recommend explicitly setting this parameter.
        voice:
          type: string
          nullable: true
          description: >
            Voice for speech synthesis.

            Considering different models have different voices and that list changes over time, the list of supported voices is not provided here.
            Please go ahead to check for available voices on each provider's website.

            When not provided, the following default voices will be applied:
              * OpenAI > alloy
              * Eevenlabs > Rachel
              * Async > nyomi
    Text2SoundParameters:
      required:
        - prompt
      type: object
      properties:
        prompt:
          type: string
          description: 'The prompt for the music/sound generation.'
          nullable: false
        duration:
          type: number
          description: >
            The duration for the generated audio in seconds

            Note these ranges from vendors: ElevenLabs: 0.5-22. Kling: 3-10. Auto if omitted.
          example: 3
          nullable: true
          maximum: 22
          minimum: 0.5
        loop:
          type: boolean
          default: false
          description: >
            Create looping audio. The usage of this param is not guarantteed as limited number of models do support this.
            (For example: Supported by ElevenLabs only.)
    Text2SoundModels:
      type: object
      properties:
        model:
          type: string
          enum: 
            - urn:air:elevenlabs:model:elevenlabs:elevenlabs-sound-effects-v2@1
            - urn:air:kling:model:kling:kling-text-to-audio@1
          nullable: true
          default: 'urn:air:elevenlabs:model:elevenlabs:elevenlabs-sound-effects-v2@1'
          description: >
            Optionally choose a specific AI model to use for this audio generation.
            
            If not specified, a default model will be applied. Please note that the default model may change over time as Picsart continues to improve performance and accuracy.
            Any change to the default will be made only after thorough testing and validation to ensure it delivers better results.

            If you require consistent behavior or wish to evaluate different models on your own, we recommend explicitly setting this parameter.
