        '500':
          $ref: '#/components/responses/500'
        '503':
          $ref: '#/components/responses/503'
  /painting/bleed:
    post:
      summary: Generate Bleed
      operationId: genai-generate-image-bleed
      description: >
        This service offers a groundbreaking functionality designed to enhance digital imagery by enabling users to enlarge any image. 

        This service enlarges the original images and generates additional pixels around the original from all sides. This helps print original images without needing to cut part of it during the print production process.
        The generated bleed area is a continuation of the original image and will ensure a consistent and high cut quality.
      tags:
        - Inpainting (Image2Image)
      requestBody:
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/ImageParameters'
                - $ref: '#/components/schemas/BleedParameters'
        required: true
      responses:
        '200':
          $ref: '#/components/responses/ImageResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '405':
          $ref: '#/components/responses/405'
        '413':
          $ref: '#/components/responses/413'
        '415':
          $ref: '#/components/responses/415'
        '429':
          $ref: '#/components/responses/429'
        '431':
          $ref: '#/components/responses/431'
        '500':
          $ref: '#/components/responses/500'
        '503':
          $ref: '#/components/responses/503'
  /painting/{inference_id}:
    get:
      summary: Get the results of the painting
      operationId: genai-image-inpainting-getresult
      description: >
        Inpaint, Outpaint, Smart Background and Expand services can work asynchronously and expose an inference identifier that can be used later to fetch te results.

        Use this service to check up on the result.
      parameters:
        - in: path
          name: inference_id
          schema:
            type: string
          required: true
          description: The painting inference identifier.
          example: 1116b57cb-1999-4bfd-8c42-c739a006a111
      tags:
        - Inpainting (Image2Image)
      responses:
        '200':
          $ref: '#/components/responses/InpaintingResultResponse'
        '202':
          $ref: '#/components/responses/InpaintingResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '405':
          $ref: '#/components/responses/405'
        '413':
          $ref: '#/components/responses/413'
        '415':
          $ref: '#/components/responses/415'
        '429':
          $ref: '#/components/responses/429'
        '431':
          $ref: '#/components/responses/431'
        '500':
          $ref: '#/components/responses/500'
        '503':
          $ref: '#/components/responses/503'
  /text2video:
    post:
      summary: Text2Video
      operationId: genai-text2video
      description: >
        The *Text2Video* service helps generate a video based on the text introduced as input by the user.
        Considering the time and cost to generate videos, only one video will be generated per request (unlike the image generation services).

        Note, that considering the big number of different models that are supported with this service, some limitations may apply.
        For example, some models (e.g. Grok Imagine Video / OpenAI Sora 2 / Sora 2 Pro / OVI) don't support the option to disable sound. With these models the result video will always be generated regardless to the provided input params.

        Similarly, note that different models do support different resolutions and output video quality parameters.
        In this case as well, the output video's resolutions and quality are not guaranteed to be exactly the same as provided input params. The service will provide what's "closer" to the original request.
        To make sure there are minimal deviations, we recommend doing test requests and checking the output video as well as doing research on original model's official documentation.
      tags:
        - Text2Video & Image2Video
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/Text2VideoParameters'
                - $ref: '#/components/schemas/Text2VideoModels'
      responses:
        '202':
          $ref: '#/components/responses/Text2ImageResponse'
        '400':
