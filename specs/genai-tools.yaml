  /painting/inpaint:
    post:
      summary: Inpaint Image
      operationId: genai-image-inpainting
      description: >
        The **Inpainting** service offers inpainting (image2Image) capabilities, enabling users to fill or replace areas within an image based on specified criteria. It operates in two modes:
        * Single Image Mode: Submit one RGBA image. The API fills the specified inner area with content based on the prompt parameter.
        * Mask Mode: Along with the RGBA image, provide a mask of identical size and format. The API uses this mask to identify areas for inpainting with content determined by the prompt parameter.
      tags:
        - Inpainting (Image2Image)
      requestBody:
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/ImageParameters'
                - $ref: '#/components/schemas/MaskParameters'
                - $ref: '#/components/schemas/InpaintingParameters'
      responses:
        '200':
          $ref: '#/components/responses/InpaintingResultResponse'
        '202':
          $ref: '#/components/responses/InpaintingResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '405':
          $ref: '#/components/responses/405'
        '413':
          $ref: '#/components/responses/413'
        '415':
          $ref: '#/components/responses/415'
        '429':
          $ref: '#/components/responses/429'
        '431':
          $ref: '#/components/responses/431'
        '500':
          $ref: '#/components/responses/500'
        '503':
          $ref: '#/components/responses/503'
  /painting/outpaint:
    post:
      summary: Outpaint Image
      operationId: genai-image-outpainting
      description: >
        The **Outpainting** service enables outpainting (image2image), allowing users to extend or replace specific parts of an image. This is a reversed form of the Inpainting service (drawing outside of the mask, not inside).
        
        It supports two operational modes:
          * Single Image Mode: Upload one RGBA image. The API enhances the outer area with content based on the prompt parameter.
          * Mask Mode: Provide an RGBA image along with a mask of the same size. The API applies this mask to paint beyond the masked region, using content determined by the prompt parameter.
      tags:
        - Inpainting (Image2Image)
      requestBody:
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/ImageParameters'
                - $ref: '#/components/schemas/MaskParameters'
                - $ref: '#/components/schemas/InpaintingParameters'
      responses:
        '200':
          $ref: '#/components/responses/InpaintingResultResponse'
        '202':
          $ref: '#/components/responses/InpaintingResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '405':
          $ref: '#/components/responses/405'
        '413':
          $ref: '#/components/responses/413'
        '415':
          $ref: '#/components/responses/415'
        '429':
          $ref: '#/components/responses/429'
        '431':
          $ref: '#/components/responses/431'
        '500':
          $ref: '#/components/responses/500'
        '503':
          $ref: '#/components/responses/503'
  /painting/remove-object:
    post:
      summary: Remove Object from an Image
      operationId: genai-remove-object
      description: >
        This service allows to remove objects from the original image by providing a mask.

        Even though the same type of a result can also achieved via the <a href="https://docs.picsart.io/reference/genai-image-inpainting">Inpainting</a> service, this service uses a specially trained model to provide fine tuned results.
      tags:
        - Inpainting (Image2Image)
      requestBody:
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/ImageParameters'
                - $ref: '#/components/schemas/MaskParameters'
